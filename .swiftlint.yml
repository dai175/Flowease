# SwiftLint Configuration for Flowease

# 無効にするルール（SwiftFormatが処理するもの）
disabled_rules:
  - trailing_whitespace
  - vertical_whitespace
  - opening_brace
  - statement_position

# オプトインルール（追加で有効にするルール）
opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional
  - fatal_error_message
  - first_where
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_string
  - sorted_first_last
  - legacy_random
  - prefer_zero_over_explicit_init

# 解析から除外するパス
excluded:
  - FloweaseTests
  - FloweaseUITests
  - build
  - DerivedData
  - .build
  - Pods

# 行の長さ制限
line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

# 型の本体の長さ制限
type_body_length:
  warning: 300
  error: 500

# ファイルの長さ制限
file_length:
  warning: 500
  error: 1000

# 関数の本体の長さ制限
function_body_length:
  warning: 50
  error: 100

# 関数のパラメータ数制限
function_parameter_count:
  warning: 5
  error: 8

# 型名の設定
type_name:
  min_length: 2
  max_length: 50

# 識別子の設定
identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y
    - i
    - j
    - k

# ネストの深さ制限
nesting:
  type_level: 3
  function_level: 5

# カスタムルール
custom_rules:
  no_print:
    name: "No print statements"
    regex: "\\bprint\\s*\\("
    message: "print() は使用しないでください。os_log または Logger を使用してください。"
    severity: warning
